name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  id-token: write
  contents: read

jobs:

# =========================================================
# VALIDATION JOB (impede erro humano)
# =========================================================
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Validate tag vs branch
        run: |
          TAG="${GITHUB_REF_NAME}"
          BRANCH="${GITHUB_REF##*/}"

          echo "Tag: $TAG"
          echo "Branch: $BRANCH"

          if [[ "$TAG" == *"-qa" && "$BRANCH" != "qa" ]]; then
            echo "Tag -qa só pode vir do branch qa"
            exit 1
          fi

          if [[ "$TAG" != *"-qa" && "$BRANCH" != "master" ]]; then
            echo "Tag de produção só pode vir do master"
            exit 1
          fi

# =========================================================
# QA
# =========================================================
  qa:
    needs: validate
    if: endsWith(github.ref_name, '-qa')

    runs-on: ubuntu-latest
    environment: homolog

    steps:
      - uses: actions/checkout@v4

      - run: echo "VERSION=${GITHUB_REF_NAME}" >> $GITHUB_ENV

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USER }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build
        run: |
          docker build \
            --label org.opencontainers.image.revision=${GITHUB_SHA} \
            -t infrascielo/opac_5:${VERSION} .

      - name: Trivy Gate
        uses: aquasecurity/trivy-action@0.20.0
        with:
          image-ref: infrascielo/opac_5:${{ env.VERSION }}
          severity: HIGH,CRITICAL
          exit-code: 1

      - name: Push
        run: docker push infrascielo/opac_5:${VERSION}

      - name: Digest
        run: |
          DIGEST=$(docker inspect --format='{{index .RepoDigests 0}}' \
          infrascielo/opac_5:${VERSION})
          echo "IMAGE_DIGEST=${DIGEST}" >> $GITHUB_ENV

      - uses: sigstore/cosign-installer@v3

      - run: cosign sign --yes ${IMAGE_DIGEST}

      - name: Update GitOps Homolog
        env:
          GITOPS_TOKEN: ${{ secrets.GITOPS_TOKEN }}
        run: |
          git clone https://${GITOPS_TOKEN}@github.com/scieloorg/gitops.git
          cd gitops

          sed -i "s|digest: sha256:.*|digest: ${IMAGE_DIGEST#*@}|" \
          apps/opac_5/homolog/kustomization.yaml

          git config user.name github-actions
          git config user.email github-actions@github.com
          git commit -am "QA ${VERSION}"
          git push

# =========================================================
# PROD
# =========================================================
  prod:
    needs: validate
    if: "!endsWith(github.ref_name, '-qa')"

    runs-on: ubuntu-latest
    environment: production   # approval gate

    steps:
      - uses: actions/checkout@v4

      - run: echo "VERSION=${GITHUB_REF_NAME}" >> $GITHUB_ENV

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USER }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build
        run: |
          docker build \
            --label org.opencontainers.image.revision=${GITHUB_SHA} \
            -t infrascielo/opac_5:${VERSION} .

      - name: Trivy Gate
        uses: aquasecurity/trivy-action@0.20.0
        with:
          image-ref: infrascielo/opac_5:${{ env.VERSION }}
          severity: HIGH,CRITICAL
          exit-code: 0

      - name: Push
        run: docker push infrascielo/opac_5:${VERSION}

      - name: Digest
        run: |
          DIGEST=$(docker inspect --format='{{index .RepoDigests 0}}' \
          infrascielo/opac_5:${VERSION})
          echo "IMAGE_DIGEST=${DIGEST}" >> $GITHUB_ENV

      - uses: sigstore/cosign-installer@v3

      - run: cosign sign --yes ${IMAGE_DIGEST}

      - name: Update GitOps Prod
        env:
          GITOPS_TOKEN: ${{ secrets.GITOPS_TOKEN }}
        run: |
          git clone https://${GITOPS_TOKEN}@github.com/scieloorg/gitops.git
          cd gitops

          sed -i "s|digest: sha256:.*|digest: ${IMAGE_DIGEST#*@}|" \
          apps/opac_5/producao/kustomization.yaml

          git config user.name github-actions
          git config user.email github-actions@github.com
          git commit -am "PROD ${VERSION}"
          git push
