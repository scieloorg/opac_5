<div
  class="modal fade ModalDefault"
  id="ModalRelatedArticles"
  tabindex="-1"
  role="dialog"
  aria-modal="true"
  aria-labelledby="ModalRelatedArticlesTitle"
  aria-describedby="ModalRelatedArticlesDesc">
  <div class="modal-dialog modal-md">
    <div class="modal-content">

      <div class="modal-header">
        <h2 class="h4 modal-title" id="ModalRelatedArticlesTitle">
          {% trans %}Artigos relacionados{% endtrans %}
        </h2>

        <button
          type="button"
          class="btn-close"
          data-bs-dismiss="modal"
          aria-label="{% trans %}Fechar{% endtrans %}">
        </button>
      </div>

      <div class="modal-body">
        <p id="ModalRelatedArticlesDesc" class="visually-hidden">
          {% trans %}Lista de links para artigos relacionados. Os links abrem em nova aba.{% endtrans %}
        </p>

        <div class="modal-center">
          <ul class="md-list inline mt-4">
            {% for source, label, link in related_links  %}
              <li>
                <a href="{{ link }}" target="_blank" rel="noopener noreferrer">
                  {{ source }}
                  <span class="visually-hidden">
                    {% trans %}(abre em nova aba){% endtrans %}
                  </span>
                </a>
              </li>
            {% endfor %}
          </ul>

          <div class="clearfix"></div>
        </div>
      </div>

    </div>
  </div>
</div>
